name: Publish to PyPI

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-release-metadata:
    name: Validate release metadata
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Verify Python and Cargo versions match
        run: |
          python - <<'PY'
          import pathlib
          import tomllib

          root = pathlib.Path.cwd()
          pyproject = tomllib.loads((root / "pyproject.toml").read_text())
          cargo = tomllib.loads((root / "Cargo.toml").read_text())
          python_version = pyproject["project"]["version"]
          cargo_version = cargo["package"]["version"]
          if python_version != cargo_version:
              raise SystemExit(
                  "pyproject.toml project.version "
                  f"{python_version!r} must match Cargo.toml package.version "
                  f"{cargo_version!r}"
              )
          print(f"manyfold release version: {python_version}")
          PY

  build-sdist:
    name: Build source distribution
    needs:
      - validate-release-metadata
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Build source distribution
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist

      - name: Upload source distribution
        uses: actions/upload-artifact@v6
        with:
          name: sdist
          path: dist/*.tar.gz

  build-wheels:
    name: Build wheel on ${{ matrix.os }}
    needs:
      - validate-release-metadata
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
          - os: macos-15-intel
            target: x86_64
          - os: macos-14
            target: aarch64
          - os: windows-latest
            target: x64
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --locked --compatibility pypi --out dist --find-interpreter
          manylinux: auto

      - name: Upload wheel
        uses: actions/upload-artifact@v6
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: dist/*.whl

  publish:
    needs:
      - build-sdist
      - build-wheels
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/p/manyfold
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v7
        with:
          pattern: "*"
          path: dist/
          merge-multiple: true

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  build-crate:
    name: Build crate package
    needs:
      - validate-release-metadata
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Rust
        run: rustup toolchain install stable --profile minimal

      - name: Verify crate package
        run: cargo package --locked

  publish-crate:
    name: Publish crate to crates.io
    needs:
      - build-crate
      - publish
    runs-on: ubuntu-latest
    environment:
      name: crates.io
      url: https://crates.io/crates/manyfold
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Rust
        run: rustup toolchain install stable --profile minimal

      - name: Publish crate to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --locked --token "$CARGO_REGISTRY_TOKEN"
