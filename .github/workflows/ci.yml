      - name: Python native-correlation plateau
        run: |
          set -o pipefail
          uv run manyfold-memory-benchmark \
            --iterations 75000 \
            --sample-every 25000 \
            --history-limit 8 \
            --traced-plateau-bytes 65536 \
            --project-events 1000000000 \
            --traced-projected-growth-bytes 134217728 \
            --traced-segment-projected-growth-bytes 134217728 \
            --rss-tail-plateau-kib 512 \
            --rss-tail-min-samples 3 \
            --max-elapsed-seconds 30 \
            --max-cpu-seconds 30 \
            --max-average-event-us 500 \
            --max-interval-event-us 1000 \
            --max-disk-input-blocks 0 \
            --max-disk-output-blocks 0 \
            --max-materialized-payloads 0 \
            --correlation-store native \
            --check \
            | tee benchmark-results/python-native-correlation.txt

      - name: Python Heart process-local nowait plateau
        run: |
          set -o pipefail
          uv run manyfold-memory-benchmark \
            --iterations 75000 \
            --sample-every 25000 \
            --history-limit 8 \
            --payload-schema any \
            --publish-mode nowait \
            --traced-plateau-bytes 65536 \
            --project-events 1000000000 \
            --traced-projected-growth-bytes 134217728 \
            --traced-segment-projected-growth-bytes 134217728 \
            --rss-tail-plateau-kib 512 \
            --rss-tail-min-samples 3 \
