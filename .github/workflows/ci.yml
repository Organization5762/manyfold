          set -o pipefail
          mkdir -p benchmark-results/fake-heart/src
          printf '%s\n' '#!/bin/sh' 'sleep 0.2' > benchmark-results/fake-heart/totem-smoke
          chmod +x benchmark-results/fake-heart/totem-smoke
          uv run manyfold-heart-benchmark \
            --heart-root benchmark-results/fake-heart \
            --totem-command ./totem-smoke \
            --duration-seconds 0.3 \
            --external-min-elapsed-seconds 0 \
            --external-min-samples 1 \
            --monitor-interval 0.01 \
            --output-json benchmark-results/heart-wrapper-provenance.json \
            --no-check \
            | tee benchmark-results/heart-wrapper-provenance.txt
          manyfold_source="$(pwd)/python/manyfold/__init__.py"
          manyfold_bridge_version="$(uv run python -c 'import manyfold; print(manyfold.bridge_version())')"
          uv run manyfold-monitor-verify \
            benchmark-results/heart-wrapper-provenance.json \
            --allow-unchecked \
            --min-samples 1 \
            --require-command-fragment lib_2026 \
            --require-metric rss \
            --require-sample-field rss \
            --require-metadata "manyfold_source=${manyfold_source}" \
            --require-metadata "manyfold_bridge_version=${manyfold_bridge_version}"

      - name: Write benchmark summary
        if: always()
        run: |
          {
            echo "### Memory regression benchmarks"
            echo
            echo "These checks fail when retained Manyfold state grows past its declared bound."
            echo
            for file in benchmark-results/*.txt; do
              echo "#### $(basename "$file" .txt)"
              echo '```'
              tail -n 20 "$file"
              echo '```'
            done
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Generate jemalloc profile summaries
        if: always()
        run: |
          if ! command -v jeprof >/dev/null 2>&1; then
            echo "jeprof not found; raw heap profiles will still be uploaded."
            exit 0
          fi
          find benchmark-results -name '*.heap' -print0 |
            while IFS= read -r -d '' heap; do
              jeprof --show_bytes --text ./target/release/memory_retention_benchmark "$heap" \
                > "${heap}.txt" || true
            done

      - name: Upload benchmark logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: memory-benchmark-results
          path: benchmark-results/**

  native-profiling:
    name: Native profiler smoke
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install uv

      - name: Set up Rust
        run: rustup toolchain install stable --profile minimal

      - name: Install profiling tools
        run: |
          sudo apt-get update
          sudo apt-get install -y heaptrack valgrind
          sudo apt-get install -y linux-tools-common linux-tools-generic || true
          sudo apt-get install -y coz-profiler || true
          sudo sh -c 'echo 1 >/proc/sys/kernel/perf_event_paranoid' || true

      - name: Sync Python environment
        run: uv sync --locked

      - name: Build profiling benchmark
        run: |
          RUSTFLAGS="-C force-frame-pointers=yes -C symbol-mangling-version=v0" \
            cargo build --profile profiling --features coz-profiler --bin memory_retention_benchmark

      - name: Prepare profiling output directory
        run: mkdir -p benchmark-results

      - name: Run required memory profilers
        run: |
          set -o pipefail
          uv run manyfold-native-profiler \
            --output-dir benchmark-results/native-profilers-required \
            --profiler dhat \
            --profiler heaptrack \
            --continue-on-error \
            -- ./target/profiling/memory_retention_benchmark \
            --iterations 2000 \
            --sample-every 1000 \
            --history-limit 8 \
            --live-plateau-bytes 0 \
            --warmup-samples 1 \
            --check-invariants-every 500 \
            | tee benchmark-results/native-profilers-required.txt

      - name: Run required Heart materialized-state memory profilers
        run: |
          set -o pipefail
          uv run manyfold-native-profiler \
            --output-dir benchmark-results/native-profilers-heart-required \
            --profiler dhat \
            --profiler heaptrack \
            --continue-on-error \
            -- ./target/profiling/memory_retention_benchmark \
            --iterations 2000 \
            --sample-every 1000 \
            --history-limit 8 \
            --warmup-samples 1 \
            --check-invariants-every 500 \
            --materialize-state \
            | tee benchmark-results/native-profilers-heart-required.txt

      - name: Verify required native profiler summaries
        run: |
          uv run manyfold-native-profiler-verify \
            benchmark-results/native-profilers-required/summary.json \
            --require-profiler dhat \
            --require-profiler heaptrack \
            --require-command-fragment memory_retention_benchmark
          uv run manyfold-native-profiler-verify \
            benchmark-results/native-profilers-heart-required/summary.json \
            --require-profiler dhat \
            --require-profiler heaptrack \
            --require-command-fragment memory_retention_benchmark \
            --require-command-fragment materialize-state

      - name: Run opportunistic profilers
        run: |
          set -o pipefail
          uv run manyfold-native-profiler \
            --output-dir benchmark-results/native-profilers-opportunistic \
            --profiler perf \
            --profiler massif \
            --profiler cachegrind \
            --profiler callgrind \
            --profiler coz \
            --skip-missing \
            --continue-on-error \
            --allow-failures \
            -- ./target/profiling/memory_retention_benchmark \
            --iterations 2000 \
            --sample-every 1000 \
            --history-limit 8 \
            --live-plateau-bytes 0 \
            --warmup-samples 1 \
            --check-invariants-every 500 \
            | tee benchmark-results/native-profilers-opportunistic.txt

      - name: Write profiler summary
        if: always()
        run: |
          {
            echo "### Native profiler smoke"
            echo
            echo "Required profilers cover heap allocation behavior."
            echo "Opportunistic profilers add CPU, cache, and causal profiles when the runner supports them."
            echo
            for file in benchmark-results/native-profilers-*.txt; do
              echo "#### $(basename "$file" .txt)"
              echo '```'
              cat "$file"
              echo '```'
            done
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload profiler artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: native-profiler-results
          path: benchmark-results/**
