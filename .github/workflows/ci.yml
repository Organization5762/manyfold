            --rss-tail-plateau-kib 512 \
            --rss-tail-min-samples 3 \
            --max-elapsed-seconds 30 \
            --max-cpu-seconds 5 \
            --max-average-event-us 100 \
            --max-interval-event-us 1000 \
            --max-disk-input-blocks 0 \
            --max-disk-output-blocks 0 \
            --max-materialized-payloads 0 \
