            --require-tail-plateau current_rss_kib=1024:3
          uv run manyfold-benchmark-log-verify \
            benchmark-results/native-high-sequence.txt \
            --min-final-step 32 \
            --min-samples 4 \
            --require-final history=8 \
            --require-final payloads=8 \
