name: CI

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "17 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  unit:
    name: Unit and lint
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install uv

      - name: Set up Rust
        run: rustup toolchain install stable --profile minimal

      - name: Sync Python environment
        run: uv sync --locked

      - name: Check Rust formatting
        run: cargo fmt --check

      - name: Run Rust tests
        run: cargo test

      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run Ruff
        run: uv run ruff check

      - name: Run Python tests
        run: uv run python -m unittest discover -s tests -p 'test_*.py'

  memory-regression:
    name: Memory regression benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install uv

      - name: Set up Rust
        run: rustup toolchain install stable --profile minimal

      - name: Install jemalloc profiler
        run: |
          sudo apt-get update
          sudo apt-get install -y libjemalloc-dev

      - name: Sync Python environment
        run: uv sync --locked

      - name: Prepare benchmark output directory
        run: mkdir -p benchmark-results

      - name: Native sparse retention plateau
        run: |
          set -o pipefail
          cargo run --release --bin memory_retention_benchmark -- \
            --iterations 1000000 \
            --sample-every 100000 \
            --history-limit 8 \
            --live-plateau-bytes 0 \
            --peak-plateau-bytes 0 \
            --rss-tail-plateau-kib 512 \
            --rss-tail-min-samples 3 \
            --project-events 1000000000 \
            --projected-live-growth-bytes 0 \
            --projected-live-segment-growth-bytes 0 \
            --projected-peak-growth-bytes 0 \
            --projected-peak-segment-growth-bytes 0 \
            --max-elapsed-seconds 30 \
            --max-cpu-seconds 30 \
            --max-average-event-us 100 \
            --max-interval-event-us 100 \
            --max-disk-input-blocks 0 \
            --max-disk-output-blocks 0 \
            --warmup-samples 1 \
            --check-invariants-every 10000 \
            --metadata-mode none \
            | tee benchmark-results/native-sparse.txt

      - name: Native correlation-store plateau
        run: |
          set -o pipefail
          cargo run --release --bin memory_retention_benchmark -- \
            --iterations 1000000 \
            --sample-every 100000 \
            --history-limit 8 \
            --live-plateau-bytes 0 \
            --peak-plateau-bytes 0 \
            --rss-tail-plateau-kib 512 \
            --rss-tail-min-samples 3 \
            --project-events 1000000000 \
            --projected-live-growth-bytes 0 \
            --projected-live-segment-growth-bytes 0 \
            --projected-peak-growth-bytes 0 \
            --projected-peak-segment-growth-bytes 0 \
            --max-elapsed-seconds 30 \
            --max-cpu-seconds 30 \
            --max-average-event-us 100 \
            --max-interval-event-us 100 \
            --max-disk-input-blocks 0 \
            --max-disk-output-blocks 0 \
            --warmup-samples 1 \
            --check-invariants-every 10000 \
            --correlation-store retained \
            | tee benchmark-results/native-correlation-store.txt

      - name: Native Heart materialized-state sparse plateau
        run: |
          set -o pipefail
          cargo run --release --bin memory_retention_benchmark -- \
            --iterations 1000000 \
            --sample-every 100000 \
            --history-limit 8 \
            --live-plateau-bytes 0 \
            --peak-plateau-bytes 0 \
            --rss-tail-plateau-kib 512 \
            --rss-tail-min-samples 3 \
            --project-events 1000000000 \
            --projected-live-growth-bytes 0 \
            --projected-live-segment-growth-bytes 0 \
            --projected-peak-growth-bytes 0 \
            --projected-peak-segment-growth-bytes 0 \
            --max-elapsed-seconds 30 \
            --max-cpu-seconds 30 \
            --max-average-event-us 100 \
            --max-interval-event-us 100 \
            --max-disk-input-blocks 0 \
            --max-disk-output-blocks 0 \
            --warmup-samples 1 \
            --check-invariants-every 10000 \
            --metadata-mode none \
            --materialize-state \
            | tee benchmark-results/native-heart-materialized-state.txt

      - name: Native Heart materialized-state sparse-metadata plateau
        run: |
          set -o pipefail
          cargo run --release --bin memory_retention_benchmark -- \
            --iterations 1000000 \
            --sample-every 100000 \
            --history-limit 8 \
            --live-plateau-bytes 0 \
            --peak-plateau-bytes 0 \
            --rss-tail-plateau-kib 512 \
            --rss-tail-min-samples 3 \
            --project-events 1000000000 \
            --projected-live-growth-bytes 0 \
            --projected-live-segment-growth-bytes 0 \
            --projected-peak-growth-bytes 0 \
            --projected-peak-segment-growth-bytes 0 \
            --max-elapsed-seconds 30 \
            --max-cpu-seconds 30 \
            --max-average-event-us 100 \
            --max-interval-event-us 100 \
            --max-disk-input-blocks 0 \
            --max-disk-output-blocks 0 \
            --warmup-samples 1 \
            --check-invariants-every 10000 \
            --metadata-mode static \
            --materialize-state \
            | tee benchmark-results/native-heart-materialized-state-sparse-metadata.txt

      - name: Native Heart materialized-state large-payload plateau
        run: |
          set -o pipefail
          cargo run --release --bin memory_retention_benchmark -- \
            --iterations 100000 \
            --sample-every 25000 \
            --history-limit 8 \
            --payload-bytes 65536 \
            --live-plateau-bytes 0 \
            --peak-plateau-bytes 0 \
            --rss-tail-plateau-kib 1024 \
            --rss-tail-min-samples 3 \
            --project-events 1000000000 \
            --projected-live-growth-bytes 0 \
            --projected-live-segment-growth-bytes 0 \
            --projected-peak-growth-bytes 0 \
            --projected-peak-segment-growth-bytes 0 \
            --max-elapsed-seconds 30 \
            --max-cpu-seconds 30 \
            --max-average-event-us 500 \
            --max-interval-event-us 500 \
            --max-disk-input-blocks 0 \
            --max-disk-output-blocks 0 \
            --warmup-samples 1 \
            --check-invariants-every 10000 \
            --metadata-mode none \
            --materialize-state \
            | tee benchmark-results/native-heart-materialized-state-large-payload.txt

      - name: Native high-sequence correlation-store smoke
        run: |
          set -o pipefail
          cargo run --release --bin memory_retention_benchmark -- \
            --seed-seq-source 999999990 \
            --iterations 32 \
            --sample-every 8 \
            --history-limit 8 \
            --live-plateau-bytes 0 \
            --peak-plateau-bytes 0 \
            --warmup-samples 1 \
            --check-invariants-every 1 \
            --correlation-store retained \
            | tee benchmark-results/native-high-sequence.txt

      - name: jemalloc leak check for native sparse mode
        run: |
          set -o pipefail
          uv run manyfold-jemalloc-leak-check \
            --output-dir benchmark-results/jemalloc-sparse \
            --leak-bytes-threshold 131072 \
            --leak-objects-threshold 2 \
            -- ./target/release/memory_retention_benchmark \
            --iterations 200000 \
            --sample-every 100000 \
            --history-limit 8 \
            --live-plateau-bytes 0 \
            --peak-plateau-bytes 0 \
            --project-events 1000000000 \
            --projected-live-growth-bytes 0 \
            --projected-live-segment-growth-bytes 0 \
            --projected-peak-growth-bytes 0 \
            --projected-peak-segment-growth-bytes 0 \
            --max-elapsed-seconds 90 \
            --max-cpu-seconds 90 \
            --max-average-event-us 500 \
            --max-interval-event-us 500 \
            --max-disk-input-blocks 0 \
            --max-disk-output-blocks 0 \
            --warmup-samples 1 \
            --check-invariants-every 10000 \
            | tee benchmark-results/jemalloc-sparse.txt

      - name: jemalloc leak check for native correlation-store mode
        run: |
          set -o pipefail
          uv run manyfold-jemalloc-leak-check \
            --output-dir benchmark-results/jemalloc-correlation-store \
            --leak-bytes-threshold 131072 \
            --leak-objects-threshold 2 \
            -- ./target/release/memory_retention_benchmark \
            --iterations 200000 \
            --sample-every 100000 \
            --history-limit 8 \
            --live-plateau-bytes 0 \
            --peak-plateau-bytes 0 \
            --project-events 1000000000 \
            --projected-live-growth-bytes 0 \
            --projected-live-segment-growth-bytes 0 \
            --projected-peak-growth-bytes 0 \
            --projected-peak-segment-growth-bytes 0 \
            --max-elapsed-seconds 90 \
            --max-cpu-seconds 90 \
            --max-average-event-us 500 \
            --max-interval-event-us 500 \
            --max-disk-input-blocks 0 \
            --max-disk-output-blocks 0 \
            --warmup-samples 1 \
            --check-invariants-every 10000 \
            --correlation-store retained \
            | tee benchmark-results/jemalloc-correlation-store.txt

      - name: jemalloc leak check for native Heart materialized-state mode
        run: |
          set -o pipefail
          uv run manyfold-jemalloc-leak-check \
            --output-dir benchmark-results/jemalloc-heart-materialized-state \
            --leak-bytes-threshold 131072 \
            --leak-objects-threshold 2 \
            -- ./target/release/memory_retention_benchmark \
            --iterations 200000 \
            --sample-every 100000 \
            --history-limit 8 \
            --live-plateau-bytes 0 \
            --peak-plateau-bytes 0 \
            --project-events 1000000000 \
            --projected-live-growth-bytes 0 \
            --projected-live-segment-growth-bytes 0 \
            --projected-peak-growth-bytes 0 \
            --projected-peak-segment-growth-bytes 0 \
            --max-elapsed-seconds 90 \
            --max-cpu-seconds 90 \
            --max-average-event-us 500 \
            --max-interval-event-us 500 \
            --max-disk-input-blocks 0 \
            --max-disk-output-blocks 0 \
            --warmup-samples 1 \
            --check-invariants-every 10000 \
            --materialize-state \
            | tee benchmark-results/jemalloc-heart-materialized-state.txt

      - name: Verify jemalloc leak summaries
        run: |
          uv run manyfold-jemalloc-verify \
            benchmark-results/jemalloc-sparse/summary.json \
            --require-command-fragment memory_retention_benchmark
          uv run manyfold-jemalloc-verify \
            benchmark-results/jemalloc-correlation-store/summary.json \
            --require-command-fragment memory_retention_benchmark
          uv run manyfold-jemalloc-verify \
            benchmark-results/jemalloc-heart-materialized-state/summary.json \
            --require-command-fragment memory_retention_benchmark

      - name: Python sparse retention plateau
        run: |
          set -o pipefail
          uv run manyfold-memory-benchmark \
            --iterations 75000 \
            --sample-every 25000 \
            --history-limit 8 \
            --traced-plateau-bytes 65536 \
            --project-events 1000000000 \
            --traced-projected-growth-bytes 134217728 \
            --traced-segment-projected-growth-bytes 134217728 \
            --rss-tail-plateau-kib 512 \
            --rss-tail-min-samples 3 \
            --max-elapsed-seconds 30 \
            --max-cpu-seconds 30 \
            --max-average-event-us 500 \
            --max-interval-event-us 1000 \
            --max-disk-input-blocks 0 \
            --max-disk-output-blocks 0 \
            --max-materialized-payloads 0 \
            --metadata-mode none \
