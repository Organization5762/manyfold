            --require-final payloads=8 \
            --require-final lineage=0 \
            --require-max correlation_index=0 \
            --require-final-max cpu_seconds=30 \
            --require-final-max elapsed_seconds=30 \
            --require-final-max average_event_us=100 \
            --require-numeric-max interval_event_us=100 \
            --require-numeric-max input_blocks=0 \
            --require-numeric-max output_blocks=0 \
            --require-tail-plateau live_allocated_bytes=0:3 \
            --require-tail-plateau peak_allocated_bytes=0:3 \
            --require-tail-plateau current_rss_kib=512:3
          uv run manyfold-benchmark-log-verify \
            benchmark-results/native-correlation-store.txt \
            --min-final-step 1000000 \
            --min-samples 10 \
            --require-final history=8 \
            --require-final payloads=8 \
            --require-final lineage=0 \
            --require-max correlation_index=0 \
            --require-final-max cpu_seconds=30 \
            --require-final-max elapsed_seconds=30 \
            --require-final-max average_event_us=100 \
            --require-numeric-max interval_event_us=100 \
            --require-numeric-max input_blocks=0 \
