[build-system]
requires = ["maturin>=1.8,<2.0"]
build-backend = "maturin"

[project]
name = "manyfold"
version = "0.1.0"
description = "PyO3-backed Manyfold RFC scaffolding and in-memory runtime."
readme = "README.md"
requires-python = ">=3.10"
license = { file = "LICENSE" }
authors = [{ name = "Codex" }]
dependencies = [
    "reactivex==5.0.0a2",
]

[project.scripts]
manyfold-rfc-checklist = "manyfold.rfc_checklist_gen:main"

[tool.maturin]
features = ["python-extension"]
module-name = "manyfold._manyfold_rust"
profile = "release"
python-source = "python"
